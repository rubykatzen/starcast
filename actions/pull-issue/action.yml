name: 'Pull Issue'
description: 'Pull open issues from a configured JSON scope into a GitHub Project V2, idempotently'
inputs:
  scope:
    description: 'JSON object with "organizations" and "repositories" string arrays'
    required: true
  project_owner:
    description: 'Org login that owns the target Project'
    required: true
  project_number:
    description: 'Numeric Project V2 number'
    required: true
  github_token:
    description: 'Token with read access to the configured scope and write access to the Project'
    required: true
runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PROJECT_OWNER: ${{ inputs.project_owner }}
        PROJECT_NUMBER: ${{ inputs.project_number }}
        SCOPE: ${{ inputs.scope }}
      run: python3 "$GITHUB_ACTION_PATH/pull_issue.py"
