name: 'Starcast Lint Playbooks'
description: 'Checks that all playbooks have a role: field in frontmatter'
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - name: Check role field in all playbooks
      shell: bash
      run: |
        ERRORS=0
        for file in playbooks/*.md; do
          ROLE=$(grep -m1 '^role:' "$file" | awk '{print $2}')
          if [ -z "$ROLE" ]; then
            echo "ERROR: $file — missing 'role:' in frontmatter"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: $file (role: $ROLE)"
          fi
        done
        if [ $ERRORS -gt 0 ]; then
          echo ""
          echo "$ERRORS playbook(s) failed lint."
          exit 1
        fi
