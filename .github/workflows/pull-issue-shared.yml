name: Pull Issue
on:
  workflow_call:
    inputs:
      scope:
        description: 'JSON object with "organizations" and "repositories" string arrays'
        required: true
        type: string
      project_owner:
        description: 'Org login that owns the target Project'
        required: true
        type: string
      project_number:
        description: 'Numeric Project V2 number'
        required: true
        type: number
    secrets:
      token:
        description: 'Token with read access to the configured scope and write access to the Project'
        required: true
jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: rubykatzen/starcast/actions/pull-issue@v0.4
        with:
          scope: ${{ inputs.scope }}
          project_owner: ${{ inputs.project_owner }}
          project_number: ${{ inputs.project_number }}
          github_token: ${{ secrets.token }}
