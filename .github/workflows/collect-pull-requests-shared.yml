name: Collect Pull Requests
on:
  workflow_call:
    inputs:
      organizations:
        description: 'JSON array of org logins; every repository in each organization is included'
        required: false
        type: string
        default: '[]'
      repositories:
        description: 'JSON array of "owner/repo" entries'
        required: false
        type: string
        default: '[]'
      project_owner:
        description: 'Org login that owns the target Project'
        required: true
        type: string
      project_number:
        description: 'Numeric Project V2 number'
        required: true
        type: number
    secrets:
      token:
        description: 'Token with read access to the configured organizations/repositories and write access to the Project'
        required: true
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: rubykatzen/starcast/actions/collect-pull-requests@v0.5
        with:
          organizations: ${{ inputs.organizations }}
          repositories: ${{ inputs.repositories }}
          project_owner: ${{ inputs.project_owner }}
          project_number: ${{ inputs.project_number }}
          github_token: ${{ secrets.token }}
