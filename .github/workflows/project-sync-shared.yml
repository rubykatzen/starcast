name: Project Sync
on:
  workflow_call:
    inputs:
      project_owner:
        description: 'Org login that owns the target Project (e.g. dupmachine)'
        required: true
        type: string
      project_number:
        description: 'Numeric Project V2 number'
        required: true
        type: number
      initial_status:
        description: 'Status option to set on newly added items (e.g. Incoming)'
        required: true
        type: string
      status_field:
        description: 'Name of the single-select Status field'
        required: false
        type: string
        default: 'Status'
      issue_number:
        description: 'Process only this issue (event-driven intake). Omit to reconcile every open issue in the calling repository.'
        required: false
        type: number
      issue_types:
        description: 'Comma-separated allow-list of native GitHub Issue Types (e.g. "Task,Bug"). Omit to accept every type.'
        required: false
        type: string
    secrets:
      github_token:
        description: 'Token with write access to the calling repository and to Projects owned by project_owner'
        required: true
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync issues into project
        env:
          GH_TOKEN: ${{ secrets.github_token }}
          REPOSITORY: ${{ github.repository }}
          PROJECT_OWNER: ${{ inputs.project_owner }}
          PROJECT_NUMBER: ${{ inputs.project_number }}
          STATUS_FIELD: ${{ inputs.status_field }}
          INITIAL_STATUS: ${{ inputs.initial_status }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          ISSUE_TYPES: ${{ inputs.issue_types }}
        run: python3 .github/scripts/project_sync.py
