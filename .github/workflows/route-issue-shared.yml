name: Route Issue
on:
  workflow_call:
    inputs:
      routes:
        description: 'JSON object mapping exact label names to destination "owner/repo" (e.g. {"Household": "dupmachine/ground-control"})'
        required: true
        type: string
      label_name:
        description: 'Label that triggered this run (e.g. github.event.label.name)'
        required: true
        type: string
      issue_number:
        description: 'Number of the issue to route (e.g. github.event.issue.number)'
        required: true
        type: number
      create_labels_if_missing:
        description: 'Create the triggering label at the destination if it does not already exist there'
        required: false
        type: boolean
        default: false
    secrets:
      token:
        description: 'Token with write access to the source and destination repositories'
        required: true
jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - uses: rubykatzen/starcast/actions/route-issue@v0.1
        with:
          routes: ${{ inputs.routes }}
          label_name: ${{ inputs.label_name }}
          issue_number: ${{ inputs.issue_number }}
          create_labels_if_missing: ${{ inputs.create_labels_if_missing }}
          github_token: ${{ secrets.token }}
